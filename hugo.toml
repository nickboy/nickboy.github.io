baseURL = '/'
languageCode = 'en-us'
title = "Nick Liu - Software Engineer"
enableRobotsTXT = true
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

theme = 'hugo-noir'

[languages]
  [languages.en]
    languageName = "English"
    title = "Nick Liu - Software Engineer"
    weight = 1

[params]
defaultTheme = "auto"
showReadingTime = true
showShareButtons = true
showPostNavLinks = true
showBreadCrumbs = true
showCodeCopyButtons = true
showWordCount = true
showRssButtonInSectionTermList = true
useHugoToc = true
disableSpecial1stPost = false
comments = false
hidemeta = false
hideSummary = false
description = "Nick Liu - Principal Software Engineer specializing in distributed systems, data infrastructure, and cloud technologies at Walmart Global Tech"
author = "Nick Liu"
keywords = ["Software Engineer", "Data Engineering", "Distributed Systems", "AWS", "Apache Spark", "Kafka", "Cloud Computing", "Nick Liu"]
images = ["/images/profile.jpg"] # Default Open Graph image
copyright = "© 2025 Nick Liu. All rights reserved."

# SEO and Social Media
[params.seo]
title = "Nick Liu - Principal Software Engineer"
description = "Experienced software engineer with expertise in data infrastructure, distributed systems, and cloud technologies. Currently leading initiatives at Walmart Global Tech."
canonical = "https://nickboy.github.io"

# Open Graph
[params.opengraph]
title = "Nick Liu - Principal Software Engineer"
description = "Portfolio and blog of Nick Liu, Principal Software Engineer at Walmart Global Tech"
image = "/images/profile.jpg"
type = "website"

# Twitter Card
[params.twitter]
card = "summary_large_image"
site = "@nickliu"
creator = "@nickliu"

[params.assets]
disableScrollBarStyle = false

[build]
writeStats = true

[sitemap]
changefreq = "monthly"
priority = 0.5

[outputs]
home = ["HTML", "RSS"]

[taxonomies]
category = "categories"
tag = "tags"

[services]
[services.googleAnalytics]
# ID = "G-XXXXXXXXXX" # Add your Google Analytics ID here if needed

[module]
[[module.mounts]]
source = "assets"
target = "assets"

[menu]
[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 10

