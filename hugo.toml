baseURL = '/'
languageCode = 'en-us'
title = "Nick Liu - Software Engineer"
enableRobotsTXT = true
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

theme = 'hugo-noir'

[languages]
  [languages.en]
    languageName = "English"
    title = "Nick Liu - Software Engineer"
    weight = 1

[params]
defaultTheme = "auto"
showReadingTime = true
showShareButtons = true
showPostNavLinks = true
showBreadCrumbs = true
showCodeCopyButtons = true
showWordCount = true
showRssButtonInSectionTermList = true
useHugoToc = true
disableSpecial1stPost = false
comments = false
hidemeta = false
hideSummary = false
description = "Nick Liu's personal website - Software Engineer, Full Stack Developer"
author = "Nick Liu"
images = ["/images/avatar.png"] # Default Open Graph image

[params.assets]
disableScrollBarStyle = false

[build]
writeStats = true

[sitemap]
changefreq = "monthly"
priority = 0.5

[outputs]
home = ["HTML", "RSS"]

[taxonomies]
category = "categories"
tag = "tags"

[services]
[services.googleAnalytics]
# ID = "G-XXXXXXXXXX" # Add your Google Analytics ID here if needed

[module]
[[module.mounts]]
source = "assets"
target = "assets"

